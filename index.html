<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>동성마린 오너스클럽</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --text:#fff;--muted:rgba(255,255,255,0.6);--muted2:rgba(255,255,255,0.28);
  --card:rgba(255,255,255,0.07);--bdr:rgba(255,255,255,0.13);--r:14px;
}
html,body{min-height:100vh;background:linear-gradient(160deg,#071e38 0%,#0d3460 45%,#1a5276 100%);color:var(--text);font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;font-size:15px;overflow-x:hidden;}

/* HEADER */
.hdr{padding:12px 16px 8px;background:rgba(5,18,35,.78);backdrop-filter:blur(10px);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100;}
.hdr-row{display:flex;align-items:center;gap:10px;}
.hdr-row img{height:44px;width:44px;object-fit:contain;border-radius:50%;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));}
.hdr-title{font-size:15px;font-weight:700;}
.hdr-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.wave-bar{height:3px;background:linear-gradient(90deg,#1a5276,#2980b9,#1a5276);background-size:200%;animation:wave 2s linear infinite;border-radius:2px;margin-top:8px;}
@keyframes wave{to{background-position:200%;}}

/* TABS */
.tab-bar{display:flex;background:rgba(0,0,0,.25);border-bottom:1px solid var(--bdr);overflow-x:auto;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{flex:1;min-width:80px;padding:10px 4px;text-align:center;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s;}
.tab.on{color:#fff;border-bottom-color:#5dade2;}

.main{padding:13px 13px 50px;}
.view{display:none;}.view.on{display:block;}

/* FORM */
.form-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:15px;display:flex;flex-direction:column;gap:13px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.7px;}
.field input,.field textarea{background:rgba(255,255,255,.1);border:1px solid var(--bdr);border-radius:10px;color:#fff;font-size:15px;padding:11px 13px;width:100%;resize:none;}
.field input::placeholder,.field textarea::placeholder{color:var(--muted2);}
.field input:focus,.field textarea:focus{outline:none;border-color:rgba(93,173,226,.6);background:rgba(255,255,255,.13);}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.divider{height:1px;background:var(--bdr);}

/* 조황 선택 버튼 */
.cho-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cho-opt{padding:10px 6px;text-align:center;background:rgba(255,255,255,.07);border:1px solid var(--bdr);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted);}
.cho-opt.sel{background:rgba(41,128,185,.25);border-color:rgba(93,173,226,.6);color:#fff;}
.cho-opt .cho-ico{font-size:20px;display:block;margin-bottom:3px;}

/* BUTTONS */
.submit-btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--r);width:100%;padding:14px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;transition:opacity .15s,transform .1s;}
.submit-btn:active{opacity:.85;transform:scale(.98);}
.btn-green{background:linear-gradient(135deg,#1a6a2a,#27ae60);box-shadow:0 4px 14px rgba(39,174,96,.4);}
.btn-blue{background:linear-gradient(135deg,#1a5276,#2980b9);box-shadow:0 4px 14px rgba(41,128,185,.35);}

/* NOTICE */
.notice-wed{background:rgba(231,76,60,.13);border:1px solid rgba(231,76,60,.35);border-radius:12px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.notice-wed .n-ico{font-size:20px;}
.notice-wed .n-title{font-size:13px;font-weight:800;color:#f1948a;}
.notice-wed .n-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.wed-warn{display:none;background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.35);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;color:#f1948a;text-align:center;}

/* CALENDAR */
.cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;}
.cal-title{font-size:15px;font-weight:700;}
.cal-nav{display:flex;gap:7px;}
.cal-nav button{background:rgba(255,255,255,.1);border:1px solid var(--bdr);border-radius:8px;color:#fff;font-size:12px;padding:5px 11px;cursor:pointer;}
.cal-nav button:active{background:rgba(255,255,255,.2);}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:14px;}
.day-col{background:var(--card);border:1px solid var(--bdr);border-radius:11px;padding:7px 3px;text-align:center;cursor:pointer;transition:all .15s;min-height:68px;display:flex;flex-direction:column;align-items:center;gap:3px;}
.day-col:active{background:rgba(255,255,255,.12);}
.day-col.today{border-color:rgba(93,173,226,.6);background:rgba(41,128,185,.15);}
.day-col.selected{border-color:#5dade2;background:rgba(41,128,185,.25);}
.day-col.has-booking{border-color:rgba(39,174,96,.4);}
.day-col.wed{background:rgba(231,76,60,.08);border-color:rgba(231,76,60,.25);cursor:default;}
.day-name{font-size:9px;color:var(--muted);font-weight:600;}
.day-col.sun .day-name,.day-col.sun .day-num{color:#f1948a;}
.day-col.sat .day-name,.day-col.sat .day-num{color:#7ec8e3;}
.day-num{font-size:15px;font-weight:700;line-height:1;}
.day-count{font-size:10px;font-weight:700;background:rgba(39,174,96,.25);color:#58d68d;border-radius:10px;padding:2px 5px;}
.day-count.zero{background:transparent;color:transparent;}
.humu-txt{font-size:9px;font-weight:800;color:#f1948a;}
.sel-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.sel-txt{font-size:14px;font-weight:700;}
.sel-cnt{font-size:11px;background:rgba(41,128,185,.3);border:1px solid rgba(93,173,226,.4);border-radius:20px;padding:3px 10px;color:#7ec8e3;}

/* 예약 카드 */
.bk-list{display:flex;flex-direction:column;gap:9px;}
.bk-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:12px 13px;}
.bk-card.out{border-color:rgba(41,128,185,.5);background:rgba(41,128,185,.08);}
.bk-card.done{opacity:.5;}
.bk-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.bk-name{font-size:14px;font-weight:700;}
.bk-boat{font-size:11px;color:var(--muted);margin-bottom:7px;}
.st-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;}
.st-wait{background:rgba(243,156,18,.2);color:#f9ca74;}
.st-out{background:rgba(41,128,185,.25);color:#7ec8e3;}
.st-done{background:rgba(39,174,96,.2);color:#58d68d;}
.bk-times{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:9px;}
.bk-tb{background:rgba(255,255,255,.05);border-radius:8px;padding:6px 9px;}
.bk-tl{font-size:9px;color:var(--muted);margin-bottom:1px;}
.bk-tv{font-size:14px;font-weight:700;}
.bk-acts{display:flex;gap:6px;}
.act-btn{flex:1;padding:7px 4px;text-align:center;border:1px solid var(--bdr);border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;background:none;color:#fff;}
.act-btn.blue{border-color:rgba(93,173,226,.5);color:#7ec8e3;}
.act-btn.blue:active{background:rgba(41,128,185,.2);}
.act-btn.green{border-color:rgba(39,174,96,.5);color:#58d68d;}
.act-btn.green:active{background:rgba(39,174,96,.2);}
.act-btn.red{border-color:rgba(231,76,60,.4);color:#f1948a;}
.act-btn.red:active{background:rgba(231,76,60,.15);}
.act-btn.gray{color:var(--muted);}

/* 조황 카드 */
.report-list{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.rp-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:13px;}
.rp-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.rp-boat{font-size:14px;font-weight:700;}
.rp-cho{font-size:13px;font-weight:700;padding:3px 10px;border-radius:20px;}
.cho-daebak{background:rgba(255,215,0,.2);color:#ffd700;}
.cho-marit{background:rgba(39,174,96,.2);color:#58d68d;}
.cho-nak{background:rgba(41,128,185,.2);color:#7ec8e3;}
.cho-kkang{background:rgba(150,150,150,.2);color:#aaa;}
.rp-info{font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;gap:8px;flex-wrap:wrap;}
.rp-fish{font-size:13px;font-weight:600;margin-bottom:4px;}
.rp-memo{font-size:12px;color:var(--muted);font-style:italic;border-left:2px solid var(--bdr);padding-left:8px;margin-top:4px;}
.rp-del{font-size:10px;color:var(--muted);cursor:pointer;background:none;border:1px solid var(--bdr);border-radius:6px;padding:2px 7px;float:right;}

/* LOCK */
.lock-wrap{display:flex;flex-direction:column;align-items:center;padding:55px 20px;gap:13px;text-align:center;}
.lock-ico{font-size:44px;}
.lock-title{font-size:17px;font-weight:700;}
.lock-sub{font-size:12px;color:var(--muted);line-height:1.6;}
.lock-input{width:100%;max-width:240px;background:rgba(255,255,255,.1);border:1px solid var(--bdr);border-radius:12px;color:#fff;font-size:22px;padding:13px;text-align:center;letter-spacing:8px;}
.lock-input:focus{outline:none;border-color:rgba(93,173,226,.6);}
.lock-btn{width:100%;max-width:240px;background:linear-gradient(135deg,#1a5276,#2980b9);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;padding:13px;cursor:pointer;}

.empty{text-align:center;padding:28px 20px;color:var(--muted);font-size:13px;line-height:1.8;}
.empty-ico{font-size:30px;margin-bottom:7px;}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#2ecc71;box-shadow:0 0 6px #2ecc71;margin-right:5px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.sync-txt{font-size:10px;color:var(--muted);margin-bottom:11px;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(39,174,96,.95);color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:rgba(231,76,60,.95);}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#5dade2;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes sp{to{transform:rotate(360deg);}}
.loading{text-align:center;padding:22px;color:var(--muted);font-size:12px;}

/* 활동위치 태그 */
.loc-tag{display:inline-block;background:rgba(41,128,185,.2);border:1px solid rgba(93,173,226,.3);border-radius:20px;padding:2px 9px;font-size:11px;color:#7ec8e3;}
</style>
</head>

  <div class="view" id="view-admin">
    <div id="lock-wrap" class="lock-wrap">
      <div class="lock-ico">🔐</div>
      <div class="lock-title">예약 현황</div>
      <div class="lock-sub">비밀번호를 입력해주세요.</div>
      <input class="lock-input" type="password" id="pw-input" placeholder="••••" maxlength="6"
        onkeydown="if(event.key==='Enter') chkPw()">
      <button class="lock-btn" onclick="chkPw()">확인</button>
    </div>
    <div id="admin-panel" style="display:none;">
      <div class="cal-hd">
        <div>
          <div class="cal-title"><span class="live-dot"></span>예약 현황</div>
          <div class="sync-txt" id="sync-txt">--</div>
        </div>
        <div class="cal-nav">
          <button onclick="mvWeek(-1)">◀ 이전</button>
          <button onclick="mvWeek(1)">다음 ▶</button>
        </div>
      </div>
      <div class="week-grid" id="week-grid"></div>
      <div id="day-detail" style="display:none;">
        <div class="sel-hd">
          <div class="sel-txt" id="sel-txt">--</div>
          <span class="sel-cnt" id="sel-cnt">0건</span>
        </div>
        <div class="bk-list" id="bk-list"><div class="loading"><span class="spin"></span>불러오는 중...</div></div>
      </div>
      <div id="no-sel" class="empty"><div class="empty-ico">👆</div>날짜를 선택하면<br>예약 목록이 표시됩니다</div>
    </div>
  </div>

  <!-- ③ 출조후기 -->
  <div class="view" id="view-report">
    <div class="form-card">
      <div class="field">
        <label>🚤 선명</label>
        <input type="text" id="r-boat" placeholder="선명 입력">
      </div>
      <div class="field">
        <label>📍 낚시 위치</label>
        <input type="text" id="r-loc" placeholder="예) 삽시도 북쪽, 외연도...">
      </div>
      <div class="field">
        <label>🐟 어종</label>
        <input type="text" id="r-fish" placeholder="예) 참돔, 우럭, 농어, 쭈꾸미...">
      </div>
      <div class="field">
        <label>📊 조황</label>
        <div class="cho-grid">
          <div class="cho-opt" onclick="selCho(this,'대박')"><span class="cho-ico">🎣</span>대박</div>
          <div class="cho-opt" onclick="selCho(this,'마릿수')"><span class="cho-ico">👍</span>마릿수</div>
          <div class="cho-opt" onclick="selCho(this,'낱마리')"><span class="cho-ico">😐</span>낱마리</div>
          <div class="cho-opt" onclick="selCho(this,'꽝')"><span class="cho-ico">😢</span>꽝</div>
        </div>
      </div>
      <div class="field">
        <label>✏️ 한줄 메모 (선택)</label>
        <input type="text" id="r-memo" placeholder="간단한 메모를 남겨주세요">
      </div>
      <div class="divider"></div>
      <button class="submit-btn btn-blue" onclick="submitReport()">📝&nbsp;&nbsp;후기 등록</button>
    </div>

    <!-- 후기 목록 -->
    <div style="margin-top:16px;">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px;"><span class="live-dot"></span>최근 출조 후기</div>
      <div id="report-list"><div class="loading"><span class="spin"></span>불러오는 중...</div></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, orderBy, limit,
         onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMM_gzNs8UREhOK-jeUrLPP9DN-Aki73A",
  authDomain: "dongsung-booking.firebaseapp.com",
  projectId: "dongsung-booking",
  storageBucket: "dongsung-booking.firebasestorage.app",
  messagingSenderId: "12280102628",
  appId: "1:12280102628:web:41e8fc5f8586ba6d8876f1"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const PAD  = n => String(n).padStart(2,'0');
const DAYS = ['일','월','화','수','목','금','토'];
const PW   = '7319';
let unlocked = false;
let weekStart = getWeekStart(new Date());
let selDate = todayStr();
let allBk = {};
let unsubs = {};
let selCho_ = '';

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${PAD(d.getMonth()+1)}-${PAD(d.getDate())}`;
}
function getWeekStart(d) {
  const r = new Date(d); r.setDate(r.getDate()-r.getDay()); return r;
}
function ds(d) { return `${d.getFullYear()}-${PAD(d.getMonth()+1)}-${PAD(d.getDate())}`; }

document.getElementById('f-date').value = todayStr();

// 탭
window.go = (name, btn) => {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('view-'+name).classList.add('on');
  btn.classList.add('on');
  if(name==='admin' && unlocked) { renderWeek(); subWeek(); }
  if(name==='report') subReports();
};

// 수요일 체크
window.chkWed = (val) => {
  const isW = val && new Date(val+'T00:00:00').getDay()===3;
  document.getElementById('wed-warn').style.display = isW?'block':'none';
};

// 예약 등록
window.submitBook = async () => {
  const date = document.getElementById('f-date').value;
  const boat = document.getElementById('f-boat').value.trim();
  const loc  = document.getElementById('f-loc').value.trim();
  const outT = document.getElementById('f-out').value;
  const inT  = document.getElementById('f-in').value;
  if(!date)         { toast('날짜를 선택해주세요',true); return; }
  if(new Date(date+'T00:00:00').getDay()===3) { toast('⛔ 수요일은 휴무입니다',true); return; }
  if(!boat)         { toast('선명을 입력해주세요',true); return; }
  if(!outT&&!inT)   { toast('출항 또는 입항 시간을 입력해주세요',true); return; }

  try {
    await addDoc(collection(db,'bookings'),{
      date, boat, loc: loc||'미정',
      outTime: outT||'-', inTime: inT||'-',
      name: boat, status:'wait', createdAt: serverTimestamp()
    });
    ['f-boat','f-loc','f-out','f-in'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('wed-warn').style.display='none';
    toast('✅ 예약이 등록됐습니다!');
  } catch(e) { toast('오류: '+e.message,true); }
};

// 비밀번호
window.chkPw = () => {
  if(document.getElementById('pw-input').value===PW) {
    unlocked=true;
    document.getElementById('lock-wrap').style.display='none';
    document.getElementById('admin-panel').style.display='block';
    renderWeek(); subWeek();
  } else {
    toast('비밀번호가 틀렸습니다',true);
    document.getElementById('pw-input').value='';
  }
};

// 주 이동
window.mvWeek = (dir) => {
  weekStart = new Date(weekStart);
  weekStart.setDate(weekStart.getDate()+dir*7);
  allBk={};
  Object.values(unsubs).forEach(u=>u&&u());
  unsubs={};
  renderWeek(); subWeek();
};

function subWeek() {
  for(let i=0;i<7;i++) {
    const d=new Date(weekStart); d.setDate(d.getDate()+i);
    const dstr=ds(d);
    if(unsubs[dstr]) continue;
    const q=query(collection(db,'bookings'),where('date','==',dstr));
    unsubs[dstr]=onSnapshot(q,snap=>{
      allBk[dstr]=snap.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(a.outTime||'').localeCompare(b.outTime||''));
      renderWeek();
      if(selDate===dstr) renderDay(dstr);
      const n=new Date();
      document.getElementById('sync-txt').textContent=
        `실시간 동기화 · ${PAD(n.getHours())}:${PAD(n.getMinutes())}:${PAD(n.getSeconds())}`;
    });
  }
}

function renderWeek() {
  const today=todayStr();
  let h='';
  for(let i=0;i<7;i++) {
    const d=new Date(weekStart); d.setDate(d.getDate()+i);
    const dstr=ds(d);
    const cnt=(allBk[dstr]||[]).length;
    const dow=d.getDay()===0?'sun':d.getDay()===6?'sat':'';
    const isW=d.getDay()===3;
    const cls=[dow,dstr===today?'today':'',dstr===selDate?'selected':'',
               cnt>0?'has-booking':'',isW?'wed':''].filter(Boolean).join(' ');
    h+=`<div class="day-col ${cls}" onclick="${isW?'':` selectDay('${dstr}')`}" style="${isW?'cursor:default':''}">
      <div class="day-name">${DAYS[d.getDay()]}</div>
      <div class="day-num">${d.getDate()}</div>
      ${isW?'<div class="humu-txt">휴무</div>':`<div class="day-count ${cnt===0?'zero':''}">${cnt>0?cnt:'·'}</div>`}
    </div>`;
  }
  document.getElementById('week-grid').innerHTML=h;
}

window.selectDay = (dstr) => {
  selDate=dstr;
  renderWeek();
  renderDay(dstr);
  document.getElementById('day-detail').style.display='block';
  document.getElementById('no-sel').style.display='none';
};

function renderDay(dstr) {
  const d=new Date(dstr+'T00:00:00');
  const list=allBk[dstr]||[];
  document.getElementById('sel-txt').textContent=`${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[d.getDay()]})`;
  document.getElementById('sel-cnt').textContent=list.length+'건';
  const el=document.getElementById('bk-list');
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-ico">🚢</div>예약이 없습니다</div>';return;}
  const stM={wait:{l:'대기중',c:'st-wait'},out:{l:'출항중',c:'st-out'},done:{l:'입항완료',c:'st-done'}};
  el.innerHTML=list.map(b=>{
    const st=stM[b.status]||stM.wait;
    const cc=b.status==='out'?' out':b.status==='done'?' done':'';
    return `<div class="bk-card${cc}">
      <div class="bk-top"><span class="bk-name">🚤 ${b.boat}</span><span class="st-badge ${st.c}">${st.l}</span></div>
      <div class="bk-boat">${b.loc&&b.loc!=='미정'?`<span class="loc-tag">📍${b.loc}</span>`:''}</div>
      <div class="bk-times">
        <div class="bk-tb"><div class="bk-tl">⬆️ 출항</div><div class="bk-tv">${b.outTime}</div></div>
        <div class="bk-tb"><div class="bk-tl">⬇️ 입항</div><div class="bk-tv">${b.inTime}</div></div>
      </div>
      <div class="bk-acts">
        ${b.status==='wait'?`<button class="act-btn blue" onclick="chgSt('${b.id}','out')">🚢 출항</button>`:''}
        ${b.status==='out'?`<button class="act-btn green" onclick="chgSt('${b.id}','done')">⚓ 입항완료</button>`:''}
        ${b.status==='done'?`<button class="act-btn gray" onclick="chgSt('${b.id}','wait')">↩️ 되돌리기</button>`:''}
        <button class="act-btn red" onclick="delBk('${b.id}')">🗑️ 삭제</button>
      </div>
    </div>`;
  }).join('');
}

window.chgSt = async (id,st) => await updateDoc(doc(db,'bookings',id),{status:st});
window.delBk = async (id) => { if(!confirm('삭제할까요?')) return; await deleteDoc(doc(db,'bookings',id)); };

// 조황 선택
window.selCho = (el,val) => {
  document.querySelectorAll('.cho-opt').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  selCho_=val;
};

// 후기 등록
window.submitReport = async () => {
  const boat = document.getElementById('r-boat').value.trim();
  const loc  = document.getElementById('r-loc').value.trim();
  const fish = document.getElementById('r-fish').value.trim();
  const memo = document.getElementById('r-memo').value.trim();

  if(!boat)   { toast('선명을 입력해주세요',true); return; }
  if(!loc)    { toast('낚시 위치를 입력해주세요',true); return; }
  if(!fish)   { toast('어종을 입력해주세요',true); return; }
  if(!selCho_){ toast('조황을 선택해주세요',true); return; }

  try {
    await addDoc(collection(db,'reports'),{
      boat, loc, fish, cho: selCho_, memo,
      date: todayStr(), createdAt: serverTimestamp()
    });
    ['r-boat','r-loc','r-fish','r-memo'].forEach(id=>document.getElementById(id).value='');
    document.querySelectorAll('.cho-opt').forEach(b=>b.classList.remove('sel'));
    selCho_='';
    toast('📝 후기가 등록됐습니다!');
  } catch(e) { toast('오류: '+e.message,true); }
};

// 후기 목록 실시간
let reportUnsub = null;
function subReports() {
  if(reportUnsub) return;
  const q = query(collection(db,'reports'), orderBy('createdAt','desc'), limit(30));
  reportUnsub = onSnapshot(q, snap => {
    const list = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderReports(list);
  });
}

const choMap = {
  '대박':{cls:'cho-daebak',ico:'🎣'},
  '마릿수':{cls:'cho-marit',ico:'👍'},
  '낱마리':{cls:'cho-nak',ico:'😐'},
  '꽝':{cls:'cho-kkang',ico:'😢'}
};

function renderReports(list) {
  const el = document.getElementById('report-list');
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-ico">🎣</div>아직 후기가 없습니다<br>첫 번째 후기를 남겨주세요!</div>';return;}
  el.innerHTML = list.map(r=>{
    const ch = choMap[r.cho]||{cls:'',ico:'?'};
    return `<div class="rp-card">
      <div class="rp-top">
        <span class="rp-boat">🚤 ${r.boat}</span>
        <span class="rp-cho ${ch.cls}">${ch.ico} ${r.cho}</span>
      </div>
      <div class="rp-info">
        <span>📍 ${r.loc}</span>
        <span>📅 ${r.date}</span>
      </div>
      <div class="rp-fish">🐟 ${r.fish}</div>
      ${r.memo?`<div class="rp-memo">${r.memo}</div>`:''}
    </div>`;
  }).join('');
}

// 토스트
window.toast = (msg,isErr=false) => {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(isErr?' err':'');
  setTimeout(()=>t.className='toast',2500);
};

// 후기 초기 로드
subReports();
</script>
</body>
</html>
